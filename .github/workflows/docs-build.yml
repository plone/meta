name: Documentation

on:
  workflow_call:
    inputs:
      python-version:
        required: true
        type: string
        default: '3.12'
      working-directory:
        type: string
        required: false
        default: '.'
      build-path:
        type: string
        required: false
        default: '_build/html'
      check-links:
        default: true
        type: boolean
      check-vale:
        default: true
        type: boolean
      upload_artifact:
        type: boolean
        default: false
    outputs:
      artifact_name:
        description: "Name of the uploaded artifact — empty when upload_artifact=false or the step was skipped"
        value: ${{ jobs.docs.outputs.artifact_name }}
      artifact_id:
        description: "GitHub Actions artifact ID — pass to actions/download-artifact"
        value: ${{ jobs.docs.outputs.artifact_id }}

jobs:
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    outputs:
      artifact_name: ${{ steps.upload-artifact.outcome == 'success' && format('docs-{0}', github.run_id) || '' }}
      artifact_id: ${{ steps.upload-artifact.outputs.artifact-id }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup uv
        uses: plone/meta/.github/actions/setup_uv@2.x
        with:
          python-version: ${{ inputs.python-version }}
          working-directory: ${{ inputs.working-directory }}

      - name: Install Dependencies
        shell: bash
        run: make install

      - name: Check for broken links
        if: ${{ inputs.check-links }}
        shell: bash
        run: |
          make linkcheckbroken

      - name: Build HTML documentation
        shell: bash
        run: |
          make build

      - name: Run vale checks
        if: ${{ inputs.check-vale }}
        shell: bash
        run: |
          make vale VALEOPTS="--minAlertLevel='warning'"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        id: upload-artifact
        if: ${{ inputs.upload_artifact }}
        with:
          name: docs-${{ github.run_id }}
          path: ${{ inputs.working-directory }}/${{ inputs.build-path }}
