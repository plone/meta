# Workflow meant to be used by external repositories
# that are configured with this `meta` repository
name: Release status
on:
  # allow this workflow to be called
  # by other workflows from other repositories
  workflow_call:

jobs:
  test:
    name: Release status
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: ["3.11"]
        os: ["ubuntu-latest"]
    steps:
      - uses: actions/checkout@v6
      - name: Install uv + caching
        uses: astral-sh/setup-uv@v7.5.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            setup.*
            tox.ini
            pyproject.toml
          python-version: ${{ matrix.python-version }}
      - name: Initialize tox
        run: |
          if [ `uvx tox list --no-desc -f init|wc -l` = 1 ]; then uvx --with tox-uv tox -e init;else true; fi
      - name: Check release status
        run: |
          uvx --with tox-uv tox -e release-check
