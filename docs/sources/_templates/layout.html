{# Extend the theme's layout to inject Open Graph meta #}
{% extends "!layout.html" %}

{% block metatags %}
{{ super() }}
<meta property="og:type" content="website">
<meta property="og:title" content="{{ title }}">
<meta property="og:description" content="Standardize configuration files across Plone Python repositories.">
<meta property="og:url" content="https://plone.github.io/meta/">
<meta name="twitter:card" content="summary">
{% endblock %}
